<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Kedai Aishwa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="font-sans text-sm">

    <div id="loginSection" class="login-bg h-screen flex items-center justify-center p-4">
        <div class="glass-card w-full p-10 max-w-md fade-in text-center">
            <div class="bg-white rounded-full w-20 h-20 mx-auto mb-6 flex items-center justify-center overflow-hidden border-2 border-white/50 shadow-inner">
                <img src="logo catering.jpeg" alt="Logo" class="w-full h-full object-cover">
            </div>
            <h2 class="text-xl font-bold text-white tracking-widest uppercase mb-1">LOGIN ADMIN</h2>
            <p class="text-white/70 text-xs mb-8">Catering Kedai Aishwa</p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-white mb-1 ml-1 text-xs font-semibold">Email</label>
                    <input type="email" id="adminEmail" placeholder="admin@kedaiaishwa.com" class="input-field">
                </div>
                <div>
                    <label class="block text-white mb-1 ml-1 text-xs font-semibold">Password</label>
                    <input type="password" id="adminPassword" placeholder="••••••••" class="input-field">
                </div>
                <button onclick="checkLogin()" class="login-btn mt-4">LOGIN SEKARANG</button>
            </div>
        </div>
    </div>

    <div id="dashboardSection" class="hidden flex h-screen bg-stone-100 fade-in">
        <aside class="w-64 bg-[#c2410c] text-white flex flex-col shadow-2xl">
            <div class="p-6 text-center border-b border-white/10">
                <div class="bg-white rounded-full w-16 h-16 mx-auto mb-3 overflow-hidden border-2 border-white/30">
                    <img src="logo catering.jpeg" alt="Logo" class="w-full h-full object-cover">
                </div>
                <h1 class="text-sm font-bold uppercase leading-tight">CATERING<br>KEDAI AISHWA</h1>
                <p class="text-[10px] opacity-60 tracking-widest uppercase mt-1">Karangampel</p>
            </div>

            <nav class="flex-1 mt-4 px-3 space-y-1">
                <button onclick="changeContent('Produk')" class="nav-link w-full"><i class="fas fa-th-large mr-3"></i> Manajemen Produk</button>
                <button onclick="changeContent('Pesanan')" id="btn-pesanan" class="nav-link w-full active"><i class="fas fa-shopping-cart mr-3"></i> Manajemen Pesanan</button>
                <button onclick="changeContent('Pendapatan')" class="nav-link w-full"><i class="fas fa-chart-line mr-3"></i> Laporan Pendapatan</button>
            </nav>

            <div class="p-4 border-t border-white/10">
                <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt mr-2"></i> Keluar</button>
            </div>
        </aside>

        <main class="flex-1 overflow-hidden flex flex-col">
            <header class="bg-white p-5 shadow-sm flex justify-between items-center border-b border-gray-200">
                <h2 id="pageTitle" class="text-base font-bold text-gray-800">Manajemen Pesanan</h2>
                <div id="notifArea" class="hidden bg-orange-500 text-white px-3 py-1 rounded-full text-[10px] animate-pulse">
                    PESANAN BARU MASUK!
                </div>
            </header>
            <div id="dynamicContent" class="p-4 overflow-auto bg-[#fffbf5] h-full"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
