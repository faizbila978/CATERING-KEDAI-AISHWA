<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kedai Aishwa</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-image-side" style="background-image: url('https://via.placeholder.com/600x800/222/a62b55?text=Fine+Dining');">
            <div class="auth-overlay-content">
                <h2>Crafting Memories Through Fine Dining</h2>
                <p>Join our exclusive culinary circle and manage your bespoke catering events with ease.</p>
            </div>
        </div>

        <div class="auth-form-side">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to Catering Kedai Aishwa</p>
            </div>
            
            <form action="index.html">
                <div class="form-group">
                    <label>Email</label>
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" class="form-input" placeholder="chef@atelier.com" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-auth-submit">Login <i class="fas fa-arrow-right"></i></button>
            </form>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Request Access</a></p>
                
                <div class="auth-divider">
                    <span>OR CONTINUE WITH</span>
                </div>
                
                <div class="social-auth-btns">
                    <button class="btn btn-secondary btn-social btn-sm">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google__G__Logo.svg" alt="Google"> Google
                    </button>
                    <button class="btn btn-secondary btn-social btn-sm">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple"> Apple
                    </button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
