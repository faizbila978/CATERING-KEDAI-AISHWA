<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isi Formulir - Kedai Aishwa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="formulir.css">
</head>
<body>

    <div class="container py-5">
        <a href="menu.html" class="text-decoration-none text-muted mb-4 d-inline-block">&larr; Back to Selection</a>
        
        <div class="row">
            <div class="col-lg-7">
                <div class="card border-0 shadow-sm p-4 rounded-4">
                    <h2 class="fw-bold mb-4">Isi Formulir</h2>
                    <form>
                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold text-muted">FULL NAME</label>
                                <input type="text" class="form-control bg-light border-0 py-2" placeholder="e.g. Julian Vercetti">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold text-muted">WHATSAPP NUMBER</label>
                                <input type="text" class="form-control bg-light border-0 py-2" placeholder="+62 812-3456-7890">
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label small fw-bold text-muted">DELIVERY ADDRESS</label>
                                <input type="text" class="form-control bg-light border-0 py-2" placeholder="Enter street name, building, or unit number">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold text-muted">EVENT DATE</label>
                                <input type="date" class="form-control bg-light border-0 py-2">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold text-muted">EVENT TIME</label>
                                <input type="time" class="form-control bg-light border-0 py-2">
                            </div>
                            <div class="col-12 mb-3">
                                <label class="form-label small fw-bold text-muted">ADDITIONAL NOTES</label>
                                <textarea class="form-control bg-light border-0" rows="4" placeholder="Mention any allergies or specific themes..."></textarea>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-lg-5 ps-lg-5 mt-4 mt-lg-0">
                <div class="card border-0 shadow-sm p-4 rounded-4">
                    <h5 class="fw-bold mb-4">Selection Summary</h5>
                    <div class="d-flex justify-content-between mb-3 border-bottom pb-3">
                        <div class="d-flex gap-3">
                            <img src="img/food-1.jpg" width="60" class="rounded-3" alt="item">
                            <div>
                                <h6 class="mb-0 fw-bold">Nasi Box Ayam</h6>
                                <small class="text-muted">x 20 Persons</small>
                            </div>
                        </div>
                        <span class="fw-bold text-maroon">Rp 900k</span>
                    </div>

                    <div class="d-flex justify-content-between mb-2 mt-4">
                        <span>Subtotal</span>
                        <span class="fw-bold">Rp 900.000</span>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <span>Delivery Fee</span>
                        <span class="text-success fw-bold">FREE</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="fw-bold">Total</h4>
                        <h3 class="fw-bold text-maroon">Rp 945.000</h3>
                    </div>
                    <a href="payment.html" class="btn btn-maroon w-100 py-3 rounded-3 fw-bold shadow">Confirm Request</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
