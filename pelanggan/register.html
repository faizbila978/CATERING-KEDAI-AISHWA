<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Kedai Aishwa</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-image-side" style="background-color: #1a1a1a;">
            <div class="auth-overlay-content" style="max-width:400px; padding:20px;">
                <div class="artisan-logo">Aishwa</div>
                <h2 style="color:white; font-size:24px;">Elevate Your Events with Culinary Artistry</h2>
                <p style="color:#aaa;">Join Kedai Aishwa and discover a world where every dish tells a story of passion and precision.</p>
            </div>
        </div>

        <div class="auth-form-side">
            <div class="auth-header">
                <h1>Create Your Account</h1>
                <p>Start your journey into bespoke catering services today.</p>
            </div>
            
            <form action="login.html">
                <div class="form-group">
                    <label>Full Name</label>
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" class="form-input" placeholder="Jane Doe" required>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" class="form-input" placeholder="jane@example.com" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password</label>
                    <i class="fas fa-redo input-icon"></i>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <div class="form-check">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-auth-submit">Sign Up</button>
            </form>
            
            <div class="auth-footer" style="text-align:center;">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </div>

</body>
</html>
