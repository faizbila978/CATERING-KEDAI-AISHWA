<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account - Catering Kedai Aishwa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-maroon" href="index.html">CateringAtelier</a>
            <div class="ms-auto">
                <a href="login.html" class="btn btn-outline-maroon px-4 rounded-pill">Login</a>
            </div>
        </div>
    </nav>

    <div class="container register-container d-flex align-items-center justify-content-center">
        <div class="card register-card shadow-lg border-0 overflow-hidden">
            <div class="row g-0">
                <div class="col-lg-6 d-none d-lg-block position-relative">
                    <img src="img/register-bg.jpg" class="h-100 w-100 object-fit-cover" alt="Artisan Catering">
                    <div class="image-overlay p-5 d-flex flex-column justify-content-center text-center">
                        <div class="mb-4">
                            <h1 class="display-4 fw-bold text-white italic-font">Artisan</h1>
                            <p class="text-white tracking-widest">CATERING</p>
                        </div>
                        <h3 class="text-white fw-bold">Elevate Your Events with Culinary Artistry</h3>
                        <p class="text-white-50 px-4">Join Kedai Aishwa and discover a world where every dish tells a story of passion and precision.</p>
                    </div>
                </div>

                <div class="col-lg-6 p-5 bg-white">
                    <div class="mb-4">
                        <h3 class="fw-bold mb-1">Create Your Account</h3>
                        <p class="text-muted small">Start your journey into bespoke catering services today.</p>
                    </div>

                    <form>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control bg-light border-0 py-2" placeholder="Jane Doe">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control bg-light border-0 py-2" placeholder="jane@example.com">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold text-muted">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control bg-light border-0 py-2" placeholder="••••••••">
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold text-muted">Confirm Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="bi bi-arrow-repeat"></i></span>
                                    <input type="password" class="form-control bg-light border-0 py-2" placeholder="••••••••">
                                </div>
                            </div>
                        </div>

                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="terms">
                            <label class="form-check-label small text-muted" for="terms">
                                I agree to the <a href="#" class="text-maroon text-decoration-none fw-bold">Terms of Service</a> and <a href="#" class="text-maroon text-decoration-none fw-bold">Privacy Policy</a>.
                            </label>
                        </div>

                        <button type="submit" class="btn btn-maroon w-100 py-3 rounded-3 fw-bold shadow-sm">
                            Sign Up
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="small text-muted">Already have an account? <a href="login.html" class="text-maroon fw-bold text-decoration-none">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
