<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Kedai Aishwa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="manajemen pesanan.css">
</head>
<body class="font-sans text-sm bg-stone-100">
    <div id="dashboardSection" class="flex h-screen fade-in">
        <aside class="w-64 bg-[#c2410c] text-white flex flex-col shadow-2xl">
            <div class="p-6 text-center border-b border-white/10">
                <div class="bg-white rounded-full w-16 h-16 mx-auto mb-3 overflow-hidden border-2 border-white/30">
                    <img src="logo catering.jpeg" alt="Logo" class="w-full h-full object-cover">
                </div>
                <h1 class="text-sm font-bold uppercase leading-tight">CATERING<br>KEDAI AISHWA</h1>
                <p class="text-[10px] opacity-60 tracking-widest uppercase mt-1">Karangampel</p>
            </div>
            <nav class="flex-1 mt-4 px-3 space-y-1">
                <a href="manajemen produk.html" class="nav-link w-full" id="btn-produk">
                    <i class="fas fa-th-large mr-3"></i> Manajemen Produk
                </a>
                <button onclick="changeContent('Pesanan')" class="nav-link w-full" id="btn-pesanan">
                    <i class="fas fa-shopping-cart mr-3"></i> Manajemen Pesanan
                </button>
                <a href="laporan pendapatan.html" class="nav-link w-full" id="btn-pendapatan">
                    <i class="fas fa-chart-line mr-3"></i> Laporan Pendapatan
                </a>
            </nav>
            <div class="p-4 border-t border-white/10">
                <button onclick="location.reload()" class="logout-btn">
                    <i class="fas fa-sign-out-alt mr-2"></i> Keluar
                </button>
            </div>
        </aside>
        <main class="flex-1 overflow-hidden flex flex-col">
            <header class="bg-white p-5 shadow-sm flex justify-between items-center border-b border-gray-200">
                <h2 id="pageTitle" class="text-base font-bold text-gray-800">Manajemen Pesanan</h2>
                <div id="notifArea" class="hidden bg-orange-500 text-white px-3 py-1 rounded-full text-[10px] animate-pulse">
                    PESANAN BARU MASUK!
                </div>
            </header>
            <div id="dynamicContent" class="p-4 overflow-auto bg-[#fffbf5] h-full">
                </div>
        </main>
    </div>
    <script src="manajemen pesanan.js"></script>
</body>
</html>
