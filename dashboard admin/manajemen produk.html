<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Kedai Aishwa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="manajeme produk.css">
</head>
<body class="bg-orange-50 font-sans text-gray-800">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-orange-700 text-white flex flex-col shadow-xl flex-shrink-0">
            <div class="p-6 text-center border-b border-orange-600">
                <div class="bg-white rounded-full w-24 h-24 mx-auto mb-3 flex items-center justify-center shadow-lg overflow-hidden border-2 border-white">
                    <img src="logo-placeholder.png" alt="Logo" class="w-full h-full object-cover">
                </div>
                <h1 class="text-lg font-bold uppercase tracking-wider leading-tight">Catering Kedai Aishwa</h1>
                <p class="text-[10px] text-orange-200 tracking-widest uppercase font-semibold">Karangampel</p>
            </div>

            <nav class="flex-1 mt-6 px-4 space-y-2">
                <a href="#" class="flex items-center p-3 rounded-lg bg-orange-800 border-l-4 border-white transition shadow-md">
                    <i class="fas fa-th-large mr-3 w-5"></i>
                    <span class="font-medium">Manajemen Produk</span>
                </a>
                <a href="manajemen pesanan.html" class="flex items-center p-3 rounded-lg hover:bg-orange-600 transition group">
                    <i class="fas fa-shopping-cart mr-3 w-5 text-orange-300 group-hover:text-white"></i>
                    <span>Manajemen Pesanan</span>
                </a>
                <a href="laporan pendapatan.html" class="flex items-center p-3 rounded-lg hover:bg-orange-600 transition group">
                    <i class="fas fa-chart-line mr-3 w-5 text-orange-300 group-hover:text-white"></i>
                    <span>Laporan Pendapatan</span>
                </a>
            </nav>

            <div class="p-4 border-t border-orange-600">
                <button class="w-full flex items-center justify-center p-2 rounded-md bg-red-500 hover:bg-red-600 transition shadow-lg text-sm font-bold text-white">
                    <i class="fas fa-sign-out-alt mr-2"></i> Keluar
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0">
            <header class="bg-white shadow-sm p-4 flex flex-col sm:flex-row justify-between items-center gap-4 z-10">
                <h2 class="text-2xl font-bold text-gray-700 flex items-center">
                    <i class="fas fa-boxes text-orange-600 mr-3"></i> Manajemen Produk
                </h2>
                <div class="flex flex-wrap justify-center gap-3">
                    <a href="tambah produk tambahan.html" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">
                        <i class="fas fa-plus-circle mr-2"></i> Tambah Produk Tambahan
                    </a>
                    <a href="tambah produk menu.html" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">
                        <i class="fas fa-plus mr-2"></i> Tambah Produk Menu
                    </a>
                </div>
            </header>

            <div class="p-4 sm:p-8 overflow-y-auto">
                <div class="mb-12">
                    <div class="flex items-center justify-between mb-6 border-b-2 border-orange-200 pb-2">
                        <h3 class="text-xl font-extrabold text-orange-800 uppercase tracking-tight">
                            <i class="fas fa-concierge-bell mr-2"></i> Menu Utama Paket
                        </h3>
                    </div>
                    <div id="container-menu-utama" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
                </div>

                <div class="mt-8">
                    <div class="flex items-center justify-between mb-6 border-b-2 border-blue-200 pb-2">
                        <h3 class="text-xl font-extrabold text-blue-800 uppercase tracking-tight">
                            <i class="fas fa-cookie-bite mr-2"></i> Menu Tambahan
                        </h3>
                    </div>
                    <div id="container-menu-tambahan" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="manajemen produk.js"></script>
</body>
</html>
